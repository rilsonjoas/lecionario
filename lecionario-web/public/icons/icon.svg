<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7A4E2D"/>
      <stop offset="100%" style="stop-color:#C26430"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F1E8"/>
      <stop offset="100%" style="stop-color:#EAE0D5"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- Decorative border -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#B49A60" stroke-width="3" opacity="0.6"/>

  <!-- Open book shape -->
  <path d="M128 320 L128 180 Q128 160 148 160 L248 160 Q256 160 256 168 L256 340 Q256 348 248 348 L148 348 Q128 348 128 328 Z"
        fill="#EAE0D5" opacity="0.95"/>
  <path d="M384 320 L384 180 Q384 160 364 160 L264 160 Q256 160 256 168 L256 340 Q256 348 264 348 L364 348 Q384 348 384 328 Z"
        fill="#F5F1E8" opacity="0.95"/>

  <!-- Book spine -->
  <rect x="252" y="156" width="8" height="196" fill="#7A4E2D" opacity="0.3"/>

  <!-- Cross on left page -->
  <rect x="175" y="200" width="6" height="100" fill="#7A4E2D" rx="2"/>
  <rect x="155" y="230" width="46" height="6" fill="#7A4E2D" rx="2"/>

  <!-- Text lines on right page -->
  <rect x="280" y="200" width="70" height="4" fill="#7A4E2D" opacity="0.4" rx="2"/>
  <rect x="280" y="220" width="60" height="4" fill="#7A4E2D" opacity="0.4" rx="2"/>
  <rect x="280" y="240" width="65" height="4" fill="#7A4E2D" opacity="0.4" rx="2"/>
  <rect x="280" y="260" width="55" height="4" fill="#7A4E2D" opacity="0.4" rx="2"/>
  <rect x="280" y="280" width="70" height="4" fill="#7A4E2D" opacity="0.4" rx="2"/>
  <rect x="280" y="300" width="50" height="4" fill="#7A4E2D" opacity="0.4" rx="2"/>

  <!-- Decorative star -->
  <text x="256" y="420" text-anchor="middle" fill="#B49A60" font-size="32" font-family="serif">&#10022;</text>
</svg>
